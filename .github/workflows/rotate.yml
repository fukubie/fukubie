name: Rotate README GIF (Turbo Mode)

on:
  schedule:
    - cron: '*/5 * * * *' # Attempt to run every 5 minutes
  workflow_dispatch:      # Manual trigger for testing

jobs:
  rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pick a Pro GIF and Break Cache
        run: |
          URLS=(
            "https://github.com/Anmol-Baranwal/Cool-GIFs-For-GitHub/assets/74038190/72903324-cf57-4e90-80a6-ed3c9734e0ed"
            "https://github.com/Anmol-Baranwal/Cool-GIFs-For-GitHub/assets/74038190/af212da4-8588-4d7c-8400-16e56f2746a0"
            "https://user-images.githubusercontent.com/74038190/212749447-bfb7e725-6987-49d9-ae85-2015e3e7cc41.gif"
            "https://user-images.githubusercontent.com/74038190/212897782-96581536-54a0-4b87-87b4-5e55f95e8a8b.gif"
          )
          
          # Pick random GIF
          SELECTED_URL=${URLS[$RANDOM % ${#URLS[@]}]}
          
          # Use date +%s to get a unique timestamp (e.g., 1713200000)
          # This forces GitHub to refresh the image immediately.
          TIMESTAMP=$(date +%s)
          NEW_IMAGE_TAG="<img src=\"$SELECTED_URL?v=$TIMESTAMP\" width=\"350\" align=\"right\" />"
          
          # Find placeholder (visible or in comment) and replace it
          # This replaces either the raw text OR the previous hidden placeholder
          sed -i "s|.*GIPHY_HOLDER_PLACEHOLDER.*|$NEW_IMAGE_TAG\n|" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only push if the randomizer chose a different GIF than last time
          git commit -m "Turbo Rotate GIF: $(date)" || exit 0
          git push
